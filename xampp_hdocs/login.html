<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PageTurn</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root { --cream:#f5f0e8; --dark:#1a1208; --brown:#5c3d1e; --gold:#c8933a; --rust:#b84c24; --text:#2d1f0e; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; display:flex; font-family:'DM Sans',sans-serif; background:var(--cream); }

    .left-panel {
      width:45%; background:var(--dark); display:flex; flex-direction:column;
      justify-content:center; align-items:center; padding:4rem;
      position:relative; overflow:hidden;
    }
    .left-panel::before {
      content:''; position:absolute; width:400px; height:400px; border-radius:50%;
      background:radial-gradient(circle, rgba(200,147,58,0.15) 0%, transparent 70%);
      top:-100px; left:-100px;
    }
    .left-panel::after {
      content:''; position:absolute; width:300px; height:300px; border-radius:50%;
      background:radial-gradient(circle, rgba(184,76,36,0.1) 0%, transparent 70%);
      bottom:-80px; right:-80px;
    }
    .left-content { position:relative; z-index:2; text-align:center; }
    .left-content .logo { font-family:'Playfair Display',serif; font-size:2rem; color:var(--gold); display:block; margin-bottom:2rem; text-decoration:none; }
    .left-content h2 { font-family:'Playfair Display',serif; font-size:2.2rem; color:var(--cream); line-height:1.3; margin-bottom:1rem; }
    .left-content h2 em { color:var(--gold); font-style:italic; }
    .left-content p { color:#a09080; font-size:0.95rem; line-height:1.7; }
    .books-deco { display:flex; gap:1rem; margin-top:3rem; justify-content:center; }
    .mini-book { width:60px; height:90px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:1.5rem; box-shadow:0 8px 24px rgba(0,0,0,0.3); }

    .right-panel { flex:1; display:flex; align-items:center; justify-content:center; padding:4rem 3rem; }
    .form-box { width:100%; max-width:420px; }
    .form-box h1 { font-family:'Playfair Display',serif; font-size:2rem; color:var(--dark); margin-bottom:0.4rem; }
    .form-box .subtitle { color:#888; font-size:0.92rem; margin-bottom:2.5rem; }
    .form-box .subtitle a { color:var(--rust); text-decoration:none; font-weight:500; }

    .form-group { margin-bottom:1.4rem; }
    .form-group label { display:block; font-size:0.85rem; font-weight:500; color:var(--text); margin-bottom:0.5rem; letter-spacing:0.3px; }
    .form-group input {
      width:100%; padding:0.85rem 1rem; border:1.5px solid #ddd;
      border-radius:6px; font-size:0.95rem; font-family:'DM Sans',sans-serif;
      color:var(--text); background:#fff; transition:border-color 0.2s;
      outline:none;
    }
    .form-group input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(200,147,58,0.1); }

    .form-options { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
    .remember { display:flex; align-items:center; gap:0.5rem; font-size:0.88rem; color:#666; cursor:pointer; }
    .remember input { width:auto; }
    .forgot { font-size:0.88rem; color:var(--rust); text-decoration:none; }
    .forgot:hover { text-decoration:underline; }

    .btn-submit {
      width:100%; padding:1rem; background:var(--dark); color:var(--cream);
      border:none; border-radius:6px; font-size:1rem; font-weight:500;
      font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s;
    }
    .btn-submit:hover { background:var(--brown); transform:translateY(-1px); box-shadow:0 6px 20px rgba(0,0,0,0.2); }

    .divider { text-align:center; margin:1.5rem 0; position:relative; }
    .divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:#e0d8cc; }
    .divider span { position:relative; background:var(--cream); padding:0 1rem; color:#aaa; font-size:0.85rem; }

    .btn-register { width:100%; padding:1rem; background:transparent; color:var(--dark); border:1.5px solid var(--dark); border-radius:6px; font-size:1rem; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; }
    .btn-register:hover { background:var(--dark); color:var(--cream); }

    .back-home { display:block; text-align:center; margin-top:2rem; color:#aaa; font-size:0.85rem; text-decoration:none; }
    .back-home:hover { color:var(--gold); }

    @media(max-width:768px) { .left-panel { display:none; } }
  </style>
</head>
<body>
  <div class="left-panel">
    <div class="left-content">
      <a href="index.html" class="logo">📚 PageTurn</a>
      <h2>Welcome <em>Back,</em> Reader</h2>
      <p>Sign in to access your cart, order history, and personalized recommendations.</p>
      <div class="books-deco">
        <div class="mini-book" style="background:#5c3d1e;">📖</div>
        <div class="mini-book" style="background:#3a2d1a; margin-top:15px;">📕</div>
        <div class="mini-book" style="background:#4a3522; margin-top:-10px;">📗</div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="form-box">
      <h1>Sign In</h1>
      <p class="subtitle">Don't have an account? <a href="register.html">Create one →</a></p>

      <form action="login_process.php" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required/>
        </div>
        <div class="form-options">
          <label class="remember"><input type="checkbox" name="remember"/> Remember me</label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="divider"><span>or</span></div>
      <button class="btn-register" onclick="location.href='register.html'">Create New Account</button>
      <a href="index.html" class="back-home">← Back to Home</a>
    </div>
  </div>
</body>
</html>
